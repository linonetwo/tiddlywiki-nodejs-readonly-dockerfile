apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tw.fullname" . }}
  labels:
    {{- include "tw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "tw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tw.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      volumes:
        - name: wiki-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "tw.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.gitSync.sshKey }}
        - name: git-ssh-key
          secret:
            secretName: {{ include "tw.fullname" . }}-git-ssh
            defaultMode: 0600
        {{- end }}
      initContainers:
        {{- if .Values.gitSync.enabled }}
        - name: git-init
          image: "{{ .Values.gitSync.image.repository }}:{{ .Values.gitSync.image.tag }}"
          imagePullPolicy: {{ .Values.gitSync.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              WIKI_DIR="/wiki"
              {{- if .Values.gitSync.subPath }}
              CONTENT_DIR="/wiki/{{ .Values.gitSync.subPath }}"
              {{- else }}
              CONTENT_DIR="/wiki"
              {{- end }}

              needs_clone() {
                if [ -f "$CONTENT_DIR/tiddlywiki.info" ]; then
                  if [ ! -d "$CONTENT_DIR/tiddlers" ]; then
                    return 0
                  fi
                  COUNT=$(find "$CONTENT_DIR/tiddlers" -maxdepth 1 -name '*.tid' 2>/dev/null | wc -l)
                  [ "$COUNT" -le 1 ] && return 0
                  return 1
                fi
                return 0
              }

              if [ -d "$WIKI_DIR/.git" ]; then
                echo "[git-init] Git repo already on PVC, skip clone (updates via git-sync sidecar)"
              elif needs_clone; then
                echo "[git-init] First clone {{ .Values.gitSync.repo }} onto PVC..."
                rm -rf "$WIKI_DIR"/* "$WIKI_DIR"/.[!.]* "$WIKI_DIR"/..?* 2>/dev/null || true
                git clone --depth 1 --branch {{ .Values.gitSync.branch }} \
                  {{ .Values.gitSync.repo }} "$WIKI_DIR"
              else
                echo "[git-init] Wiki data exists without git metadata, skipping clone"
              fi

              if [ ! -f "$CONTENT_DIR/tiddlywiki.info" ] && [ ! -d "$CONTENT_DIR/tiddlers" ]; then
                echo "[git-init] ERROR: wiki content not found at $CONTENT_DIR"
                exit 1
              fi
              echo "[git-init] Wiki ready at $CONTENT_DIR"
          env:
            {{- if .Values.gitSync.proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.gitSync.proxy | quote }}
            - name: HTTPS_PROXY
              value: {{ .Values.gitSync.proxy | quote }}
            {{- end }}
            {{- if .Values.gitSync.sshKey }}
            - name: GIT_SSH_COMMAND
              value: ssh -o StrictHostKeyChecking=no -i /etc/git-secret/ssh-private-key
            {{- end }}
          volumeMounts:
            - name: wiki-data
              mountPath: /wiki
            {{- if .Values.gitSync.sshKey }}
            - name: git-ssh-key
              mountPath: /etc/git-secret
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
        {{- else }}
        - name: init-wiki
          image: "{{ .Values.wiki.image.repository }}:{{ .Values.wiki.image.tag }}"
          imagePullPolicy: {{ .Values.wiki.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              if [ -f /wiki/tiddlywiki.info ]; then
                echo "[init-wiki] Wiki data exists (tiddlywiki.info found)"
              elif [ -d /wiki/tiddlers ]; then
                echo "[init-wiki] Wiki data exists (tiddlers/ found)"
              else
                echo "[init-wiki] Empty wiki volume, creating default wiki..."
                rm -rf /wiki/* /wiki/.[!.]* /wiki/..?* 2>/dev/null || true
                tiddlywiki /wiki --init server && echo "[init-wiki] Default wiki created" || echo "[init-wiki] Init failed"
              fi
          volumeMounts:
            - name: wiki-data
              mountPath: /wiki
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
        {{- end }}
      containers:
        {{- if .Values.gitSync.enabled }}
        - name: git-sync
          image: "{{ .Values.gitSync.image.repository }}:{{ .Values.gitSync.image.tag }}"
          imagePullPolicy: {{ .Values.gitSync.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              while true; do
                echo "[git-sync] Pulling from {{ .Values.gitSync.repo }}..."
                if [ -d /wiki/.git ]; then
                  cd /wiki
                  git fetch origin {{ .Values.gitSync.branch }}
                  git reset --hard "origin/{{ .Values.gitSync.branch }}"
                  echo "[git-sync] Updated to latest {{ .Values.gitSync.branch }}"
                else
                  echo "[git-sync] No git repo in /wiki, waiting for git-init..."
                fi
                echo "[git-sync] Sleep {{ .Values.gitSync.interval }}s..."
                sleep {{ .Values.gitSync.interval }}
              done
          env:
            {{- if .Values.gitSync.proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.gitSync.proxy | quote }}
            - name: HTTPS_PROXY
              value: {{ .Values.gitSync.proxy | quote }}
            {{- end }}
            {{- if .Values.gitSync.sshKey }}
            - name: GIT_SSH_COMMAND
              value: ssh -o StrictHostKeyChecking=no -i /etc/git-secret/ssh-private-key
            {{- end }}
          volumeMounts:
            - name: wiki-data
              mountPath: /wiki
            {{- if .Values.gitSync.sshKey }}
            - name: git-ssh-key
              mountPath: /etc/git-secret
            {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
        {{- end }}
        - name: tiddlywiki
          image: "{{ .Values.wiki.image.repository }}:{{ .Values.wiki.image.tag }}"
          imagePullPolicy: {{ .Values.wiki.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.wiki.port }}
              name: http
          env:
            - name: WIKI_PATH
              {{- if .Values.gitSync.subPath }}
              value: /wiki/{{ .Values.gitSync.subPath }}
              {{- else }}
              value: /wiki
              {{- end }}
            - name: PORT
              value: "{{ .Values.wiki.port }}"
            - name: HOST
              value: "{{ .Values.wiki.host }}"
            - name: ROOT_TIDDLER
              value: "{{ .Values.wiki.rootTiddler }}"
            - name: READ_ONLY_MODE
              value: "{{ .Values.wiki.readOnlyMode }}"
            {{- if .Values.wiki.username }}
            - name: USERNAME
              value: "{{ .Values.wiki.username }}"
            {{- end }}
            {{- if .Values.wiki.password }}
            - name: PASSWORD
              value: "{{ .Values.wiki.password }}"
            {{- end }}
            {{- if .Values.wiki.pluginPath }}
            - name: TIDDLYWIKI_PLUGIN_PATH
              value: "{{ .Values.wiki.pluginPath }}"
            {{- end }}
            {{- if .Values.wiki.themePath }}
            - name: TIDDLYWIKI_THEME_PATH
              value: "{{ .Values.wiki.themePath }}"
            {{- end }}
            {{- if .Values.wiki.languagePath }}
            - name: TIDDLYWIKI_LANGUAGE_PATH
              value: "{{ .Values.wiki.languagePath }}"
            {{- end }}
          volumeMounts:
            - name: wiki-data
              mountPath: /wiki
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.wiki.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.wiki.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.wiki.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
